version: 2
multi-ecosystem-groups:
  all-updates:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Toronto"

updates:
  - package-ecosystem: "bun"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-updates"
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    open-pull-requests-limit: 1
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-updates"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 1
